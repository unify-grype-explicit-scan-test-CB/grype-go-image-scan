name: grype-explicit-scan
kind: workflow
apiVersion: automation.cloudbees.io/v1alpha1
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  trivy-scan:
    steps:
      - name: checkout Source Code
        uses: cloudbees-io/checkout@v1

      - name: Scan with Grype
        uses: cloudbees-io/grype-plugin@CBP-35850-2
        with:
          binary-tar-path: ./golang-alpine.tar

      - name: Scan with Grype private
        uses: cloudbees-io/grype-private-plugin@CBP-35850
        with:
          binary-tar-path: ./golang-alpine.tar
